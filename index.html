<!DOCTYPE html>
<html lang="en">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<title>Stockwise — Portfolio AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>

  /* ==================== AUTH SCREEN ==================== */
  #auth-screen {
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
    max-width: 430px; margin: 0 auto;
  }
  #auth-screen.hidden { display: none; }
  #app-screen.hidden { display: none; }

  .auth-logo {
    font-family: 'DM Serif Display', serif;
    font-size: 42px; letter-spacing: -1px;
    margin-bottom: 6px;
  }
  .auth-logo span { color: var(--green); }
  .auth-tagline { font-size: 14px; color: var(--muted); margin-bottom: 40px; text-align: center; }

  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; background: var(--surface2); border-radius: 12px; padding: 4px; width: 100%; }
  .auth-tab {
    flex: 1; padding: 10px; border-radius: 9px; font-size: 14px; font-weight: 600;
    cursor: pointer; text-align: center; transition: all 0.2s; color: var(--muted); border: none; background: none;
  }
  .auth-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  .auth-form { width: 100%; }
  .auth-input-group { margin-bottom: 14px; }
  .auth-input {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; color: var(--text); font-size: 16px;
    font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .auth-input:focus { border-color: var(--accent); }
  .auth-input::placeholder { color: var(--muted); }

  .btn-auth-primary {
    width: 100%; background: linear-gradient(135deg, var(--blue), var(--purple));
    color: white; border: none; border-radius: 14px; padding: 16px;
    font-size: 16px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; margin-bottom: 12px; transition: opacity 0.2s;
  }
  .btn-auth-primary:active { opacity: 0.85; }
  .btn-auth-primary:disabled { opacity: 0.5; }

  .btn-google {
    width: 100%; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 14px; padding: 15px;
    font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: border-color 0.2s; margin-bottom: 12px;
  }
  .btn-google:hover { border-color: var(--accent); }

  .auth-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 4px 0 12px; color: var(--muted); font-size: 12px;
  }
  .auth-divider::before, .auth-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .auth-error {
    background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3);
    border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--red);
    margin-bottom: 12px; display: none;
  }
  .auth-error.show { display: block; }

  .auth-success {
    background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.3);
    border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--green);
    margin-bottom: 12px; display: none; text-align: center;
  }
  .auth-success.show { display: block; }

  /* User avatar in header */
  .user-menu { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .user-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white; overflow: hidden;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f5;
    --muted: #6b6b80;
    --green: #00e5a0;
    --red: #ff4d6d;
    --gold: #f5c842;
    --blue: #5b8fff;
    --purple: #a78bfa;
    --radius: 20px;
    --accent: #5b8fff;
    --card-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  }

  /* ---- THEMES ---- */
  body.theme-midnight { --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c27; --border:rgba(255,255,255,0.07); --text:#f0f0f5; --muted:#6b6b80; --accent:#5b8fff; --card-gradient:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); }
  body.theme-forest   { --bg:#0b1a0e; --surface:#111f14; --surface2:#192b1d; --border:rgba(255,255,255,0.07); --text:#e8f5e9; --muted:#5a7a5e; --green:#4caf76; --blue:#43a868; --accent:#4caf76; --card-gradient:linear-gradient(135deg,#0b2e14,#0d3b1a,#0a4520); }
  body.theme-sunset   { --bg:#12060e; --surface:#1c0d17; --surface2:#271220; --border:rgba(255,100,100,0.1); --text:#fff0f0; --muted:#7a5060; --blue:#ff6b6b; --purple:#ff9a5c; --accent:#ff6b6b; --card-gradient:linear-gradient(135deg,#2e0d1a,#3d1420,#4a1830); }
  body.theme-ocean    { --bg:#030d1a; --surface:#071828; --surface2:#0d2438; --border:rgba(0,180,255,0.1); --text:#e8f4ff; --muted:#3a6080; --blue:#00bfff; --purple:#0099cc; --accent:#00bfff; --card-gradient:linear-gradient(135deg,#071828,#0a2540,#0d3560); }
  body.theme-light    { --bg:#f5f5f7; --surface:#ffffff; --surface2:#f0f0f5; --border:rgba(0,0,0,0.08); --text:#1a1a2e; --muted:#8888a0; --green:#00a870; --red:#e03050; --gold:#c9a000; --blue:#4070ff; --purple:#7050e0; --accent:#4070ff; --card-gradient:linear-gradient(135deg,#4070ff,#5b40c0,#3050cc); }
  body.theme-gold     { --bg:#0d0900; --surface:#1a1200; --surface2:#251b00; --border:rgba(245,200,66,0.1); --text:#fff8e0; --muted:#806040; --blue:#f5c842; --purple:#ffaa00; --accent:#f5c842; --card-gradient:linear-gradient(135deg,#2e1f00,#3d2a00,#4a3200); }
  body.theme-aurora   { --bg:#05080f; --surface:#0d1220; --surface2:#141c30; --border:rgba(100,255,200,0.08); --text:#e8fff5; --muted:#4a6860; --green:#00ffcc; --blue:#00ccff; --purple:#cc00ff; --accent:#00ffcc; --card-gradient:linear-gradient(135deg,#0a1f2e,#0d2040,#0a1530); }

  /* Theme-aware portfolio card */
  .portfolio-card { background: var(--card-gradient) !important; }

  /* Light theme specific overrides */
  body.theme-light .bottom-nav { background: rgba(245,245,247,0.92); border-top:1px solid rgba(0,0,0,0.1); }
  body.theme-light .nav-label { color: #888; }
  body.theme-light .nav-item.active .nav-label { color: var(--accent); }
  body.theme-light .holding-card { background: #fff; border-color: rgba(0,0,0,0.08); }
  body.theme-light .ai-card { background: #fff; }
  body.theme-light .news-card { background: #fff; }
  body.theme-light .market-card { background: #fff; }
  body.theme-light .sheet { background: #fff; }
  body.theme-light .input-field { background: #f5f5f7; border-color: rgba(0,0,0,0.1); color: #1a1a2e; }
  body.theme-light .stat { background: rgba(0,0,0,0.04); }
  body.theme-light .tab { background: #f0f0f5; border-color: rgba(0,0,0,0.08); color: #666; }

  /* Theme picker styles */
  .theme-sheet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .theme-swatch {
    border-radius: 14px; padding: 10px 6px; text-align: center; cursor: pointer;
    border: 2px solid transparent; transition: all 0.2s; display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }
  .theme-swatch.active { border-color: var(--accent); transform: scale(1.05); }
  .theme-swatch:active { transform: scale(0.95); }
  .theme-dot { width: 32px; height: 32px; border-radius: 50%; }
  .theme-name { font-size: 11px; font-weight: 600; }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }




  /* Header */
  .header {
    padding: 8px 20px 20px;
    background: linear-gradient(180deg, var(--bg) 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 99;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .app-name {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.5px;
  }

  .app-name span { color: var(--green); }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }

  /* Main scroll content */
  .content {
    padding: 0 16px 120px;
  }

  /* Portfolio Card */
  .portfolio-card {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid rgba(91,143,255,0.2);
    position: relative;
    overflow: hidden;
  }

  .portfolio-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(91,143,255,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }

  .portfolio-label {
    font-size: 12px;
    font-weight: 500;
    color: rgba(240,240,245,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .portfolio-value {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 10px;
  }

  .portfolio-change {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 14px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 20px;
    background: rgba(0,229,160,0.12);
    color: var(--green);
  }

  .portfolio-change.negative {
    background: rgba(255,77,109,0.12);
    color: var(--red);
  }

  .portfolio-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 18px;
  }

  .stat {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px;
  }

  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  .stat-value { font-size: 16px; font-weight: 600; }

  /* Section headers */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    margin-top: 24px;
  }

  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
  }

  .section-action {
    font-size: 13px;
    color: var(--blue);
    font-weight: 500;
    cursor: pointer;
    background: none;
    border: none;
    padding: 6px 12px;
    background: rgba(91,143,255,0.1);
    border-radius: 20px;
  }

  /* Holdings list */
  .holding-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .holding-card:active { transform: scale(0.98); }

  .holding-icon {
    width: 46px; height: 46px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 15px;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .holding-info { flex: 1; min-width: 0; }
  .holding-ticker { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .holding-name { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .holding-right { text-align: right; flex-shrink: 0; }
  .holding-value { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .holding-change { font-size: 12px; font-weight: 500; }
  .holding-change.pos { color: var(--green); }
  .holding-change.neg { color: var(--red); }

  .loading-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; } 50% { opacity: 1; }
  }

  /* AI Suggestion Cards */
  .ai-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .ai-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 3px 0 0 3px;
  }
  .ai-card.buy::before { background: var(--green); }
  .ai-card.sell::before { background: var(--red); }
  .ai-card.hold::before { background: var(--gold); }
  .ai-card.watch::before { background: var(--blue); }

  .ai-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .ai-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .ai-badge.buy { background: rgba(0,229,160,0.15); color: var(--green); }
  .ai-badge.sell { background: rgba(255,77,109,0.15); color: var(--red); }
  .ai-badge.hold { background: rgba(245,200,66,0.15); color: var(--gold); }
  .ai-badge.watch { background: rgba(91,143,255,0.15); color: var(--blue); }

  .ai-ticker { font-weight: 700; font-size: 16px; }
  .ai-reason { font-size: 13px; color: rgba(240,240,245,0.75); line-height: 1.5; }
  .ai-confidence {
    display: flex; align-items: center; gap: 8px; margin-top: 10px;
  }
  .confidence-bar {
    flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden;
  }
  .confidence-fill { height: 100%; border-radius: 2px; transition: width 1s ease; }
  .confidence-label { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* News section */
  .news-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 14px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .news-source {
    font-size: 10px;
    font-weight: 700;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .news-headline {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .news-meta { font-size: 11px; color: var(--muted); }

  .news-impact {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    white-space: nowrap;
    margin-top: 2px;
  }
  .news-impact.pos { background: rgba(0,229,160,0.15); color: var(--green); }
  .news-impact.neg { background: rgba(255,77,109,0.15); color: var(--red); }
  .news-impact.neu { background: rgba(107,107,128,0.2); color: var(--muted); }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: rgba(13,13,18,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 12px 0 24px;
    z-index: 100;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 4px;
    transition: all 0.2s;
  }

  .nav-icon {
    font-size: 22px;
    filter: grayscale(1) opacity(0.4);
    transition: all 0.2s;
  }

  .nav-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.2s;
  }

  .nav-item.active .nav-icon { filter: none; }
  .nav-item.active .nav-label { color: var(--green); }

  /* Modal / Sheet */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .sheet-overlay.open { opacity: 1; pointer-events: all; }

  .sheet {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    z-index: 201;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    padding: 0 20px 40px;
    max-height: 85vh;
    overflow-y: auto;
  }

  .sheet.open { transform: translateX(-50%) translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 20px;
  }

  .sheet-title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    margin-bottom: 20px;
  }

  /* Form elements */
  .input-group { margin-bottom: 16px; }
  .input-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .input-field {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--blue); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    color: white;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn-primary:active { opacity: 0.85; }

  /* AI Chat bubble */
  .ai-chat-btn {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 54px; height: 54px;
    background: linear-gradient(135deg, var(--green), #00b8a0);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(0,229,160,0.4);
    cursor: pointer;
    z-index: 150;
    border: none;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .tab.active {
    background: rgba(91,143,255,0.15);
    color: var(--blue);
    border-color: rgba(91,143,255,0.3);
  }

  /* AI Analysis section */
  .ai-analysis-wrapper {
    background: linear-gradient(135deg, rgba(167,139,250,0.1), rgba(91,143,255,0.1));
    border: 1px solid rgba(167,139,250,0.2);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 20px;
  }

  .ai-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; color: var(--purple);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); animation: pulse 1.5s infinite; }

function onSignedIn(user) {
  currentUser = user;
  const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'User';
  const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2);
  const avatarEl = document.getElementById('user-avatar-text');
  const avatarImg = document.getElementById('user-avatar-img');
  if (avatarEl) avatarEl.textContent = initials;
  if (avatarImg && user.user_metadata?.avatar_url) {
    avatarImg.src = user.user_metadata.avatar_url;
    avatarImg.style.display = 'block';
    if (avatarEl) avatarEl.style.display = 'none';
  }
  // Mobile header avatar
  const greetEl = document.getElementById('user-greeting');
  if (greetEl) greetEl.textContent = name.split(' ')[0];

  // Desktop nav avatar
  const navAvatarText = document.getElementById('nav-avatar-text');
  const navAvatarImg = document.getElementById('nav-avatar-img');
  if (navAvatarText) navAvatarText.textContent = initials;
  if (navAvatarImg && user.user_metadata?.avatar_url) {
    navAvatarImg.src = user.user_metadata.avatar_url;
    navAvatarImg.style.display = 'block';
    if (navAvatarText) navAvatarText.style.display = 'none';
  }

  // Show desktop user menu
  const desktopMenu = document.querySelector('.desktop-user-menu');
  if (desktopMenu && window.innerWidth >= 768) {
    desktopMenu.style.display = 'flex';
    const g = document.getElementById('user-greeting');
    if (g) g.style.display = 'block';
  }
  window.addEventListener('resize', () => {
    const dm = document.querySelector('.desktop-user-menu');
    if (dm && currentUser) dm.style.display = window.innerWidth >= 768 ? 'flex' : 'none';
    const g = document.getElementById('user-greeting');
    if (g && currentUser) g.style.display = window.innerWidth >= 768 ? 'block' : 'none';
  });
  showAppScreen();
  loadSavedTheme();
  loadHoldingsFromSupabase();
}

async function loadHoldingsFromSupabase() {
  if (!currentUser) return;
  try {
    showToast('⏳ Loading your portfolio...');
    const { data, error } = await sb.from('holdings')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('added_at', { ascending: true });
    if (error) throw error;
    holdings = (data || []).map(r => ({
      id: r.id,
      ticker: r.ticker,
      shares: parseFloat(r.shares),
      cost: parseFloat(r.cost),
      addedAt: r.added_at
    }));
    showToast('✅ Portfolio loaded (' + holdings.length + ' holdings)');
    renderPortfolio();
    if (holdings.length > 0) generateSuggestions();
  } catch(e) {
    showToast('⚠️ Could not load portfolio');
    renderPortfolio();
  }
}

async function addHoldingToSupabase(holding) {
  if (!currentUser) return null;
  const { data, error } = await sb.from('holdings').insert({
    user_id: currentUser.id,
    ticker: holding.ticker,
    shares: holding.shares,
    cost: holding.cost
  }).select().single();
  if (error) throw error;
  return data;
}

async function deleteHoldingFromSupabase(holdingId) {
  if (!currentUser) { throw new Error('Not logged in'); }
  if (!holdingId) { throw new Error('No holding ID provided'); }
  console.log('Deleting holding ID:', holdingId, 'for user:', currentUser.id);
  const { data, error } = await sb.from('holdings')
    .delete()
    .eq('id', holdingId)
    .eq('user_id', currentUser.id)
    .select();
  console.log('Delete result:', data, error);
  if (error) throw error;
}

async function updateHoldingInSupabase(holdingId, shares, cost) {
  if (!currentUser) return;
  const { error } = await sb.from('holdings').update({ shares, cost }).eq('id', holdingId).eq('user_id', currentUser.id);
  if (error) throw error;
}

// ==========================================
// STOCK PRICE (Multi-source with fallbacks)
// ==========================================
async function fetchStockPrice(ticker) {
  if (stockCache[ticker] && Date.now() - stockCache[ticker].ts < 60000) {
    return stockCache[ticker];
  }

  // Try multiple proxies in order
  const proxies = [
    () => fetchViaCorsproxy(ticker),
    () => fetchViaAllorigins(ticker),
    () => fetchViaFinanceAPI(ticker),
  ];

  for (const attempt of proxies) {
    try {
      const result = await attempt();
      if (result && result.price) {
        stockCache[ticker] = { ...result, ts: Date.now() };
        return stockCache[ticker];
      }
    } catch (e) {}
  }

  return { ticker, price: null, change: 0, changePct: 0, name: ticker, error: true, ts: Date.now() };
}

async function fetchViaCorsproxy(ticker) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=2d`;
  const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
  const res = await fetch(proxy, { signal: AbortSignal.timeout(6000) });
  const parsed = await res.json();
  return extractYahooData(ticker, parsed);
}

async function fetchViaAllorigins(ticker) {
  const url = `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=2d`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxy, { signal: AbortSignal.timeout(6000) });
  const data = await res.json();
  const parsed = JSON.parse(data.contents);
  return extractYahooData(ticker, parsed);
}

async function fetchViaFinanceAPI(ticker) {
  // Fallback: use Frankfurter-style free stock API
  const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=demo`, { signal: AbortSignal.timeout(6000) });
  const data = await res.json();
  if (data && data.c && data.c > 0) {
    const price = data.c;
    const prev = data.pc;
    const change = price - prev;
    const changePct = (change / prev) * 100;
    return { ticker, price, change, changePct, prev, name: ticker };
  }
  throw new Error('No data');
}

function extractYahooData(ticker, parsed) {
  const meta = parsed.chart.result[0].meta;
  const price = meta.regularMarketPrice;
  const prev = meta.chartPreviousClose || meta.previousClose;
  if (!price) throw new Error('No price');
  const change = price - prev;
  const changePct = (change / prev) * 100;
  return { ticker, price, change, changePct, prev, name: meta.longName || meta.shortName || ticker };
}

async function addHolding() {
  const ticker = document.getElementById('add-ticker').value.trim().toUpperCase();
  const shares = parseFloat(document.getElementById('add-shares').value);
  const cost = parseFloat(document.getElementById('add-cost').value);
  if (!ticker || !shares || !cost) { showToast('⚠️ Please fill all fields'); return; }
  if (holdings.find(h => h.ticker === ticker)) { showToast('Already in portfolio'); return; }
  const btn = document.querySelector('#add-sheet .btn-primary');
  btn.textContent = 'Fetching price...';
  btn.disabled = true;
  const stock = await fetchStockPrice(ticker);
  if (stock.error || !stock.price) { showToast('❌ Check ticker & internet connection'); btn.textContent = 'Add to Portfolio'; btn.disabled = false; return; }
  const newHolding = { ticker, shares, cost, addedAt: Date.now() };
  btn.textContent = 'Saving...';
  try {
    const saved = await addHoldingToSupabase(newHolding);
    if (saved) newHolding.id = saved.id;
  } catch(e) {}
  holdings.push(newHolding);
  closeSheet('add');
  document.getElementById('add-ticker').value = '';
  document.getElementById('add-shares').value = '';
  document.getElementById('add-cost').value = '';
  btn.textContent = 'Add to Portfolio';
  btn.disabled = false;
  showToast('✅ ' + ticker + ' saved to Google Sheets!');
  renderPortfolio();
  generateSuggestions();
}

// ==========================================
// RENDER PORTFOLIO
// ==========================================
async function renderPortfolio() {
  if (holdings.length === 0) {
    document.getElementById('holdings-list').innerHTML = `
      <div class="empty-state">
        <div class="icon">📊</div>
        <p>No holdings yet.<br>Add your first stock to get started.</p>
      </div>`;
    document.getElementById('total-value').textContent = '$0.00';
    document.getElementById('change-text').textContent = '$0.00 (0.00%)';
    document.getElementById('holdings-count').textContent = '0';
    document.getElementById('days-gain').textContent = '—';
    document.getElementById('total-return').textContent = '—';
    document.getElementById('last-updated').textContent = '—';
    document.getElementById('ai-portfolio-analysis').style.display = 'none';
    return;
  }

  // Show skeleton
  const container = document.getElementById('holdings-list');
  container.innerHTML = holdings.map(() => `<div class="skeleton" style="height:78px;margin-bottom:10px;border-radius:16px"></div>`).join('');

  // Fetch all prices
  const prices = await Promise.all(holdings.map(h => fetchStockPrice(h.ticker)));
  const priceMap = {};
  prices.forEach(p => priceMap[p.ticker] = p);

  let totalValue = 0, totalCost = 0, totalDayChange = 0;
  const colors = ['#5b8fff','#a78bfa','#00e5a0','#f5c842','#ff4d6d','#38bdf8','#fb7185','#34d399'];

  container.innerHTML = '';
  holdings.forEach((h, i) => {
    const p = priceMap[h.ticker];
    const value = p.price ? p.price * h.shares : h.cost * h.shares;
    const costBasis = h.cost * h.shares;
    const gain = value - costBasis;
    const gainPct = (gain / costBasis) * 100;
    const dayGain = p.change ? p.change * h.shares : 0;
    totalValue += value;
    totalCost += costBasis;
    totalDayChange += dayGain;

    const color = colors[i % colors.length];
    const card = document.createElement('div');
    card.className = 'holding-card';
    card.innerHTML = `
      <div class="holding-icon" style="color:${color}">${h.ticker.substring(0,2)}</div>
      <div class="holding-info">
        <div class="holding-ticker">${h.ticker}</div>
        <div class="holding-name">${p.name || h.ticker} · ${h.shares} shares</div>
      </div>
      <div class="holding-right">
        <div class="holding-value">${p.price ? '$'+p.price.toFixed(2) : '—'}</div>
        <div class="holding-change ${p.changePct >= 0 ? 'pos' : 'neg'}">
          ${p.changePct >= 0 ? '▲' : '▼'} ${Math.abs(p.changePct).toFixed(2)}%
        </div>
      </div>`;
    card.onclick = () => showHoldingDetail(h, p, gain, gainPct);
    container.appendChild(card);
  });

  // Update summary
  const totalGain = totalValue - totalCost;
  const totalGainPct = (totalGain / totalCost) * 100;
  const dayPct = (totalDayChange / (totalValue - totalDayChange)) * 100;

  document.getElementById('total-value').textContent = '$' + totalValue.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  const changeEl = document.getElementById('total-change');
  const isPos = totalDayChange >= 0;
  changeEl.className = 'portfolio-change' + (isPos ? '' : ' negative');
  changeEl.innerHTML = `<span>${isPos ? '▲' : '▼'}</span><span id="change-text">${isPos ? '+' : ''}$${Math.abs(totalDayChange).toFixed(2)} (${Math.abs(dayPct).toFixed(2)}%) Today</span>`;
  document.getElementById('days-gain').innerHTML = `<span style="color:${totalDayChange>=0?'var(--green)':'var(--red)'}">${totalDayChange>=0?'+':'-'}$${Math.abs(totalDayChange).toFixed(2)}</span>`;

function quickAction(ticker, action) {
  const sharesInput = document.getElementById('edit-shares');
  const costInput = document.getElementById('edit-cost');
  const h = holdings.find(x => x.ticker === ticker);
  if (!h) return;
  if (action === 'buy') {
    const extra = parseFloat(prompt('How many shares did you buy?') || 0);
    const buyPrice = parseFloat(prompt('At what price per share?') || 0);
    if (extra > 0 && buyPrice > 0) {
      const newShares = h.shares + extra;
      const newCost = ((h.shares * h.cost) + (extra * buyPrice)) / newShares;
      sharesInput.value = newShares.toFixed(4);
      costInput.value = newCost.toFixed(2);
      showToast('Updated — tap Save Changes to confirm');
    }
  } else {
    const sold = parseFloat(prompt('How many shares did you sell?') || 0);
    if (sold > 0 && sold < h.shares) {
      sharesInput.value = (h.shares - sold).toFixed(4);
      showToast('Updated — tap Save Changes to confirm');
    } else if (sold >= h.shares) {
      if (confirm('Selling all shares — remove ' + ticker + ' from portfolio?')) removeHolding(ticker);
    }
  }
}

async function saveEditHolding(ticker) {
  const newShares = parseFloat(document.getElementById('edit-shares').value);
  const newCost = parseFloat(document.getElementById('edit-cost').value);
  if (!newShares || !newCost || newShares <= 0 || newCost <= 0) {
    showToast('⚠️ Enter valid shares and cost'); return;
  }
  const btn = document.querySelector('#add-sheet button[onclick*="saveEditHolding"]');
  if (btn) { btn.textContent = '⏳ Saving...'; btn.disabled = true; }
  const idx = holdings.findIndex(h => h.ticker === ticker);
  if (idx > -1) {
    holdings[idx].shares = newShares;
    holdings[idx].cost = newCost;
  }
  try {
    await updateHoldingInSheet(ticker, newShares, newCost);
    showToast('✅ ' + ticker + ' updated in Google Sheets!');
  } catch(e) {
    showToast('⚠️ Saved locally, sync failed');
  }
  closeSheet('add');
  resetAddSheet();
  renderPortfolio();
  generateSuggestions();
}

async function removeHolding(ticker) {
  const holding = holdings.find(h => h.ticker === ticker);
  if (!holding) { showToast('Could not find ' + ticker); return; }

  console.log('Removing holding:', holding);

  closeSheet('add');
  showToast('🗑 Removing ' + ticker + '...');

  try {
    if (!holding.id) {
      // No local ID — query Supabase directly by ticker
      console.log('No local ID, querying Supabase for ticker:', ticker);
      const { data, error } = await sb.from('holdings')
        .delete()
        .eq('ticker', ticker)
        .eq('user_id', currentUser.id)
        .select();
      console.log('Direct delete result:', data, error);
      if (error) throw error;
    } else {
      await deleteHoldingFromSupabase(holding.id);
    }
    holdings = holdings.filter(h => h.ticker !== ticker);
    showToast('✅ ' + ticker + ' removed!');
  } catch(e) {
    console.error('Delete error:', e);
    showToast('❌ Delete failed: ' + e.message);
    return;
  }

  setTimeout(resetAddSheet, 300);
  renderPortfolio();
  generateSuggestions();
}

async function generateSuggestions() {
  if (holdings.length === 0) {
    allSuggestions = [];
    renderSuggestions();
    return;
  }
  document.getElementById('ai-portfolio-analysis').style.display = 'block';
  document.getElementById('ai-analysis-text').textContent = 'Analyzing your portfolio with live market data...';

  // Fetch current prices
  const prices = await Promise.all(holdings.map(h => fetchStockPrice(h.ticker)));
  const priceMap = {};
  prices.forEach(p => priceMap[p.ticker] = p);

  const portfolioSummary = holdings.map(h => {
    const p = priceMap[h.ticker];
    const value = p.price ? p.price * h.shares : h.cost * h.shares;
    const gain = value - h.cost * h.shares;
    const gainPct = (gain / (h.cost * h.shares)) * 100;
    return `${h.ticker}: ${h.shares} shares @ avg $${h.cost}, current price $${p.price?.toFixed(2) || 'unknown'}, P&L: ${gainPct.toFixed(1)}%, 1-day change: ${p.changePct?.toFixed(2) || 0}%`;
  }).join('\n');

  const prompt = `You are a financial advisor AI. Analyze this portfolio and provide specific actionable suggestions.

Portfolio:
${portfolioSummary}

Today's date: ${new Date().toLocaleDateString()}

Respond with JSON only (no markdown, no explanation outside JSON):
{
  "portfolio_summary": "2-3 sentence overall portfolio assessment",
  "suggestions": [
    {
      "ticker": "AAPL",
      "action": "buy|sell|hold|watch",
      "reason": "Specific reason based on performance and market context (2 sentences)",
      "confidence": 75
    }
  ]
}

Base your analysis on the actual numbers provided. Be direct and specific.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.filter(c => c.type === 'text').map(c => c.text).join('');
    // Robust JSON extraction - find first { to last }
    const jsonStart = text.indexOf('{');
    const jsonEnd = text.lastIndexOf('}');
    if (jsonStart === -1 || jsonEnd === -1) throw new Error('No JSON found');
    const clean = text.substring(jsonStart, jsonEnd + 1);
    const parsed = JSON.parse(clean);
    document.getElementById('ai-analysis-text').textContent = parsed.portfolio_summary || '';
    // Sanitize action to always be one of: buy, sell, hold, watch
    const validActions = ['buy','sell','hold','watch'];
    allSuggestions = (parsed.suggestions || []).map(s => ({
      ...s,
      action: validActions.includes((s.action||'').toLowerCase().trim())
        ? (s.action).toLowerCase().trim()
        : 'hold'
    }));
    // Reset filter to 'all' when fresh suggestions arrive
    resetFilterTabs();
    renderSuggestions();
  } catch (e) {
    // Fallback suggestions based on actual P&L data
    allSuggestions = holdings.map(h => {
      const p = priceMap[h.ticker];
      const gainPct = p.price ? ((p.price - h.cost) / h.cost) * 100 : 0;
      const dayChg = p.changePct || 0;
      let action = 'hold', reason = '';
      if (gainPct < -10) { action = 'sell'; reason = `Down ${Math.abs(gainPct).toFixed(1)}% from cost basis. Consider cutting losses or reviewing thesis.`; }
      else if (gainPct > 30 && dayChg < -1) { action = 'sell'; reason = `Up ${gainPct.toFixed(1)}% overall but showing weakness today (-${Math.abs(dayChg).toFixed(2)}%). Consider taking profits.`; }
      else if (dayChg > 2) { action = 'watch'; reason = `Strong day up ${dayChg.toFixed(2)}%. Monitor for continued momentum or reversal.`; }
      else if (gainPct > 10) { action = 'hold'; reason = `Healthy ${gainPct.toFixed(1)}% gain. Hold and let winners run.`; }
      else { action = 'hold'; reason = `Performing near cost basis. Hold and monitor for catalysts.`; }
      return { ticker: h.ticker, action: action.toLowerCase().trim(), reason, confidence: Math.floor(55 + Math.random() * 30) };
    });
    document.getElementById('ai-analysis-text').textContent = `Your portfolio has ${holdings.length} position${holdings.length>1?'s':''}. Connect to live AI for detailed analysis.`;
    renderSuggestions();
  }
}

function renderSuggestions() {
  const list = document.getElementById('suggestions-list');
  if (!list) return;

  if (!allSuggestions || allSuggestions.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🤖</div><p>Add holdings on the Portfolio tab to get AI-powered suggestions.</p></div>';
    return;
  }

  // Normalize every action to lowercase, letters only
  const normalized = allSuggestions.map(s => {
    const a = String(s.action || 'hold').toLowerCase().trim().replace(/[^a-z]/g, '');
    const validActions = ['buy','sell','hold','watch'];
    return { ...s, action: validActions.includes(a) ? a : 'hold' };
  });

  const filtered = currentFilter === 'all'
    ? normalized
    : normalized.filter(s => s.action === currentFilter);

  if (filtered.length === 0) {
    const msgs = {
      buy:  'No Buy signals right now. Your stocks may already be fairly valued.',
      sell: 'No Sell signals right now. AI sees no reason to sell your current holdings.',
      hold: 'No Hold suggestions right now.',
      watch: 'No Watch suggestions right now.'
    };
    const msg = msgs[currentFilter] || 'No ' + currentFilter + ' suggestions right now.';
    list.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>' + msg + '</p></div>';
    return;
  }

  const colorMap = { buy:'var(--green)', sell:'var(--red)', hold:'var(--gold)', watch:'var(--blue)' };
  list.innerHTML = filtered.map(s => {
    const color = colorMap[s.action] || 'var(--blue)';
    return [
      '<div class="ai-card ' + s.action + '">',
        '<div class="ai-card-header">',
          '<div class="ai-ticker">' + (s.ticker||'') + '</div>',
          '<div class="ai-badge ' + s.action + '">' + s.action.toUpperCase() + '</div>',
        '</div>',
        '<div class="ai-reason">' + (s.reason||'') + '</div>',
        '<div class="ai-confidence">',
          '<div class="confidence-bar">',
            '<div class="confidence-fill" style="width:' + (s.confidence||50) + '%;background:' + color + '"></div>',
          '</div>',
          '<div class="confidence-label">Confidence: ' + (s.confidence||50) + '%</div>',
        '</div>',
      '</div>'
    ].join('');
  }).join('');
}

// Completely standalone filter function - no class manipulation, pure inline styles
function filterSuggestions(filter) {
  currentFilter = filter;
  const filters = ['all','buy','sell','hold','watch'];
  filters.forEach(function(f) {
    const btn = document.getElementById('ftab-' + f);
    if (!btn) return;
    if (f === filter) {
      btn.style.background = 'rgba(91,143,255,0.15)';
      btn.style.color = 'var(--blue)';
      btn.style.borderColor = 'rgba(91,143,255,0.3)';
    } else {
      btn.style.background = 'none';
      btn.style.color = 'var(--muted)';
      btn.style.borderColor = 'var(--border)';
    }
  });
  renderSuggestions();
}

function resetFilterTabs() {
  filterSuggestions('all');
}

const THEMES = ['midnight','forest','sunset','ocean','light','gold','aurora'];

function applyTheme(theme) {
  // Remove all theme classes
  THEMES.forEach(t => document.body.classList.remove('theme-' + t));
  document.body.classList.add('theme-' + theme);
  localStorage.setItem('stockwise_theme', theme);
  // Update swatches
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
  const active = document.getElementById('swatch-' + theme);
  if (active) active.classList.add('active');
  showToast('🎨 ' + theme.charAt(0).toUpperCase() + theme.slice(1) + ' theme applied!');
}

function openThemePicker() {
  document.getElementById('theme-overlay').classList.add('open');
  document.getElementById('theme-sheet').classList.add('open');
}

function openUserMenu() {
  if (!currentUser) return;
  const name = currentUser.user_metadata?.full_name || currentUser.email?.split('@')[0] || 'User';
  const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2);
  document.getElementById('user-menu-initials').textContent = initials;
  document.getElementById('user-menu-name').textContent = name;
  document.getElementById('user-menu-email').textContent = currentUser.email;
  const menuImg = document.getElementById('user-menu-img');
  if (currentUser.user_metadata?.avatar_url) {
    menuImg.src = currentUser.user_metadata.avatar_url;
    menuImg.style.display = 'block';
    document.getElementById('user-menu-initials').style.display = 'none';
  }
  document.getElementById('user-overlay').classList.add('open');
  document.getElementById('user-sheet').classList.add('open');
}

function refreshPortfolio() {
  stockCache = {};
  loadHoldingsFromSupabase();
  closeSheet('user');
  showToast('🔄 Refreshing...');
}

function loadSavedTheme() {
  const saved = localStorage.getItem('stockwise_theme') || 'midnight';
  THEMES.forEach(t => document.body.classList.remove('theme-' + t));
  document.body.classList.add('theme-' + saved);
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active'));
  const active = document.getElementById('swatch-' + saved);
  if (active) active.classList.add('active');
}

let portfolioChart = null;
let currentChartRange = '1W';
let dashPriceMap = {};

async function loadDashboard() {
  if (holdings.length === 0) {
    document.getElementById('dash-total-value').textContent = '$0.00';
    document.getElementById('dash-total-change').textContent = 'Add stocks to see your dashboard';
    return;
  }

  document.getElementById('dash-last-updated').textContent = 'Loading...';

  // Fetch all prices
  const prices = await Promise.all(holdings.map(h => fetchStockPrice(h.ticker)));
  prices.forEach(p => dashPriceMap[p.ticker] = p);

  // Calculate totals
  let totalValue = 0, totalCost = 0, totalDayChange = 0;
  const stockPerf = [];

  holdings.forEach(h => {
    const p = dashPriceMap[h.ticker];
    const value = p.price ? p.price * h.shares : h.cost * h.shares;
    const cost = h.cost * h.shares;
    const gain = value - cost;
    const gainPct = (gain / cost) * 100;
    const dayGain = (p.change || 0) * h.shares;
    totalValue += value;
    totalCost += cost;
    totalDayChange += dayGain;
    stockPerf.push({ ticker: h.ticker, name: p.name || h.ticker, value, gain, gainPct, dayGain });
  });

  const totalGain = totalValue - totalCost;
  const totalGainPct = (totalGain / totalCost) * 100;
  const dayPct = totalCost > 0 ? (totalDayChange / totalCost) * 100 : 0;

  // Update header stats
  document.getElementById('dash-total-value').textContent = '$' + totalValue.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  const changeEl = document.getElementById('dash-total-change');
  const isPos = totalGain >= 0;
  changeEl.style.color = isPos ? 'var(--green)' : 'var(--red)';
  changeEl.textContent = (isPos?'+':'-') + '$' + Math.abs(totalGain).toFixed(2) + ' (' + (isPos?'+':'') + totalGainPct.toFixed(2) + '%) all time  |  ' + (totalDayChange>=0?'+':'-') + '$' + Math.abs(totalDayChange).toFixed(2) + ' today';

  document.getElementById('dash-last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  // Quick stats
  document.getElementById('dash-invested').textContent = '$' + totalCost.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const gainEl = document.getElementById('dash-gain');
  gainEl.textContent = (totalGain>=0?'+':'-') + '$' + Math.abs(totalGain).toFixed(2);
  gainEl.style.color = totalGain>=0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('dash-gain-pct').textContent = (totalGainPct>=0?'+':'') + totalGainPct.toFixed(2) + '%';
  document.getElementById('dash-gain-pct').style.color = totalGainPct>=0 ? 'var(--green)' : 'var(--red)';

  // Best & worst
  const sorted = [...stockPerf].sort((a,b) => b.gainPct - a.gainPct);
  if (sorted.length > 0) {
    document.getElementById('dash-best').textContent = sorted[0].ticker;
    document.getElementById('dash-best-pct').textContent = '+' + sorted[0].gainPct.toFixed(2) + '%';
    const worst = sorted[sorted.length-1];
    document.getElementById('dash-worst').textContent = worst.ticker;
    document.getElementById('dash-worst-pct').textContent = (worst.gainPct>=0?'+':'') + worst.gainPct.toFixed(2) + '%';
    document.getElementById('dash-worst-pct').style.color = worst.gainPct >= 0 ? 'var(--green)' : 'var(--red)';
  }

  // Dividend tile
  await loadDividendTile(dashPriceMap);

  // Allocation chart
  renderAllocation(stockPerf, totalValue);

  // Performance table
  renderPerfTable(sorted);

  // Main portfolio chart
  await renderPortfolioChart(currentChartRange, totalValue, totalCost);
}

async function renderPortfolioChart(range, currentValue, totalCost) {
  const canvas = document.getElementById('portfolio-chart');
  if (!canvas) return;

  // Generate historical data points by fetching historical prices
  const { labels, values } = await buildChartData(range, currentValue, totalCost);

  const isProfit = values[values.length-1] >= values[0];
  const color = isProfit ? '#00e5a0' : '#ff4d6d';

  if (portfolioChart) { portfolioChart.destroy(); portfolioChart = null; }

  const ctx = canvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.parentElement.offsetHeight || 180);
  gradient.addColorStop(0, isProfit ? 'rgba(0,229,160,0.3)' : 'rgba(255,77,109,0.3)');
  gradient.addColorStop(1, 'rgba(0,0,0,0)');

  portfolioChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: color,
        borderWidth: 2.5,
        backgroundColor: gradient,
        fill: true,
        tension: 0.4,
        pointRadius: 0,
        pointHoverRadius: 6,
        pointHoverBackgroundColor: color,
        pointHoverBorderColor: '#fff',
        pointHoverBorderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      resizeDelay: 0,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(20,20,30,0.95)',
          titleColor: '#6b6b80',
          bodyColor: '#f0f0f5',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          padding: 12,
          callbacks: {
            label: ctx => ' $' + ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: { color: '#6b6b80', font: { size: 10 }, maxTicksLimit: 6 }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
          border: { display: false },
          ticks: {
            color: '#6b6b80', font: { size: 10 },
            callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(1)+'k' : v.toFixed(0))
          }
        }
      }
    }
  });
}

async function buildChartData(range, currentValue, totalCost) {
  // Get number of data points and interval based on range
  const configs = {
    '1W': { days: 7, interval: '1d', points: 7 },
    '1M': { days: 30, interval: '1d', points: 30 },
    '3M': { days: 90, interval: '1wk', points: 13 },
    '1Y': { days: 365, interval: '1wk', points: 52 },
    '3Y': { days: 1095, interval: '1mo', points: 36 },
    '5Y': { days: 1825, interval: '1mo', points: 60 },
  };
  const cfg = configs[range] || configs['1Y'];

  try {
    // Fetch historical data for each holding in parallel
    const historicalData = await Promise.all(
      holdings.map(h => fetchHistoricalPrices(h.ticker, cfg.days, cfg.interval))
    );

    // Find common date range
    if (!historicalData[0] || historicalData[0].length === 0) throw new Error('No data');

    const dates = historicalData[0].map(d => d.date);
    const values = dates.map((date, i) => {
      let portfolioVal = 0;
      holdings.forEach((h, hi) => {
        const hist = historicalData[hi];
        const point = hist[i] || hist[hist.length-1];
        if (point) portfolioVal += point.price * h.shares;
      });
      return portfolioVal;
    });

    // Format labels
    const labels = dates.map(d => {
      const date = new Date(d * 1000);
      if (range === '1W' || range === '1M') return date.toLocaleDateString([],{month:'short',day:'numeric'});
      if (range === '3M' || range === '1Y') return date.toLocaleDateString([],{month:'short',day:'numeric'});
      return date.toLocaleDateString([],{month:'short',year:'2-digit'});
    });

    return { labels, values };
  } catch(e) {
    // Fallback: generate simulated data based on current value and cost
    return generateSimulatedChart(range, currentValue, totalCost);
  }
}

async function fetchHistoricalPrices(ticker, days, interval) {
  try {
    const end = Math.floor(Date.now() / 1000);
    const start = end - (days * 86400);
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=${interval}&period1=${start}&period2=${end}`;
    const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
    const res = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
    const data = await res.json();
    const result = data.chart.result[0];
    const timestamps = result.timestamp;
    const closes = result.indicators.quote[0].close;
    return timestamps.map((t, i) => ({ date: t, price: closes[i] || closes[i-1] || 0 })).filter(d => d.price > 0);
  } catch(e) {
    // Try allorigins fallback
    try {
      const end = Math.floor(Date.now() / 1000);
      const start = end - (days * 86400);
      const url = `https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?interval=${interval}&period1=${start}&period2=${end}`;
      const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      const res = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
      const raw = await res.json();
      const data = JSON.parse(raw.contents);
      const result = data.chart.result[0];
      const timestamps = result.timestamp;
      const closes = result.indicators.quote[0].close;
      return timestamps.map((t, i) => ({ date: t, price: closes[i] || 0 })).filter(d => d.price > 0);
    } catch(e2) {
      return [];
    }
  }
}

function generateSimulatedChart(range, currentValue, totalCost) {
  const points = { '1W':7,'1M':30,'3M':13,'1Y':52,'3Y':36,'5Y':60 }[range] || 52;
  const labels = [];
  const values = [];
  const now = new Date();
  const daysBack = { '1W':7,'1M':30,'3M':90,'1Y':365,'3Y':1095,'5Y':1825 }[range] || 365;

  // Simulate growth from totalCost to currentValue with some noise
  const startVal = totalCost * 0.75;
  const endVal = currentValue;
  const trend = (endVal - startVal) / points;

  for (let i = 0; i < points; i++) {
    const d = new Date(now - ((points - i) / points) * daysBack * 86400000);
    if (range === '1W' || range === '1M') {
      labels.push(d.toLocaleDateString([],{month:'short',day:'numeric'}));
    } else if (range === '3M' || range === '1Y') {
      labels.push(d.toLocaleDateString([],{month:'short',day:'numeric'}));
    } else {
      labels.push(d.toLocaleDateString([],{month:'short',year:'2-digit'}));
    }
    const noise = (Math.random() - 0.45) * startVal * 0.04;
    values.push(Math.max(0, startVal + trend * i + noise));
  }
  values[values.length-1] = endVal;
  return { labels, values };
}

async function switchChartRange(range, el) {
  currentChartRange = range;
  document.querySelectorAll('.range-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (portfolioChart) { portfolioChart.destroy(); portfolioChart = null; }
  const canvas = document.getElementById('portfolio-chart');
  if (canvas) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  let totalValue = 0, totalCost = 0;
  holdings.forEach(h => {
    const p = dashPriceMap[h.ticker];
    const value = p && p.price ? p.price * h.shares : h.cost * h.shares;
    totalValue += value;
    totalCost += h.cost * h.shares;
  });

  await renderPortfolioChart(range, totalValue, totalCost);
}

function renderAllocation(stockPerf, totalValue) {
  if (stockPerf.length === 0) return;
  const colors = ['#5b8fff','#a78bfa','#00e5a0','#f5c842','#ff4d6d','#38bdf8','#fb7185','#34d399','#f97316','#e879f9'];
  const wrap = document.getElementById('dash-allocation-wrap');
  wrap.style.display = 'block';

  const bar = document.getElementById('dash-alloc-bar');
  bar.innerHTML = stockPerf.map((s, i) => {
    const pct = (s.value / totalValue) * 100;
    return `<div class="allocation-segment" style="width:${pct}%;background:${colors[i%colors.length]}"></div>`;
  }).join('');

  const legend = document.getElementById('dash-alloc-legend');
  legend.innerHTML = stockPerf.map((s, i) => {
    const pct = (s.value / totalValue) * 100;
    return `
      <div class="legend-item">
        <div class="legend-dot" style="background:${colors[i%colors.length]}"></div>
        <div class="legend-name">${s.ticker}</div>
        <div class="legend-val">$${s.value.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>
        <div class="legend-pct">${pct.toFixed(1)}%</div>
      </div>`;
  }).join('');
}

function renderPerfTable(sorted) {
  if (sorted.length === 0) return;
  document.getElementById('dash-perf-wrap').style.display = 'block';
  const maxAbs = Math.max(...sorted.map(s => Math.abs(s.gainPct)));
  document.getElementById('dash-perf-list').innerHTML = sorted.map(s => `
    <div class="perf-row">
      <div>
        <div class="perf-ticker">${s.ticker}</div>
        <div class="perf-name">${s.name.substring(0,20)}</div>
      </div>
      <div class="perf-bar-wrap">
        <div class="perf-bar-fill" style="width:${Math.abs(s.gainPct)/maxAbs*100}%;background:${s.gainPct>=0?'var(--green)':'var(--red)'}"></div>
      </div>
      <div class="perf-pct" style="color:${s.gainPct>=0?'var(--green)':'var(--red)'}">${s.gainPct>=0?'+':''}${s.gainPct.toFixed(2)}%</div>
    </div>`).join('');
}

let divViewMode = 'monthly'; // 'monthly' or 'annual'
let divData = []; // [{ticker, shares, price, yield, annual, monthly}]

function switchDivView(mode) {
  divViewMode = mode;
  const mBtn = document.getElementById('div-tab-monthly');
  const aBtn = document.getElementById('div-tab-annual');
  if (mBtn) {
    mBtn.style.background = mode === 'monthly' ? 'rgba(0,229,160,0.15)' : 'none';
    mBtn.style.color = mode === 'monthly' ? 'var(--green)' : 'var(--muted)';
    mBtn.style.borderColor = mode === 'monthly' ? 'rgba(0,229,160,0.3)' : 'var(--border)';
  }
  if (aBtn) {
    aBtn.style.background = mode === 'annual' ? 'rgba(0,229,160,0.15)' : 'none';
    aBtn.style.color = mode === 'annual' ? 'var(--green)' : 'var(--muted)';
    aBtn.style.borderColor = mode === 'annual' ? 'rgba(0,229,160,0.3)' : 'var(--border)';
  }
  renderDividendBreakdown();
}

async function loadDividendTile(priceMap) {
  divData = [];

  // Show loading state
  const wrap = document.getElementById('dash-dividend-wrap');
  if (wrap) wrap.style.display = 'block';
  const totalEl = document.getElementById('div-total');
  if (totalEl) totalEl.textContent = '...';

  // Fetch live yield for ALL stocks in parallel from Yahoo Finance
  // Fall back to hardcoded list only if live fetch fails
  const yieldResults = await Promise.all(holdings.map(async h => {
    // Always try live first
    let liveYield = await fetchDividendYield(h.ticker);
    // If live returns 0, check hardcoded list as backup
    if (liveYield === 0 && KNOWN_YIELDS.hasOwnProperty(h.ticker.toUpperCase())) {
      liveYield = KNOWN_YIELDS[h.ticker.toUpperCase()];
    }
    return { ticker: h.ticker, yieldPct: liveYield };
  }));

  const yieldMap = {};
  yieldResults.forEach(r => yieldMap[r.ticker] = r.yieldPct);

  for (const h of holdings) {
    const p = priceMap[h.ticker];
    const price = p && p.price ? p.price : h.cost;
    const value = price * h.shares;
    const yieldPct = yieldMap[h.ticker] || 0;
    const annualIncome = value * (yieldPct / 100);

    divData.push({
      ticker: h.ticker,
      shares: h.shares,
      price,
      yieldPct,
      annual: annualIncome,
      monthly: annualIncome / 12,
      value,
      isLive: yieldPct > 0
    });
  }

  // Sort by income descending
  divData.sort((a, b) => b.annual - a.annual);
  renderDividendBreakdown();
}

function renderDividendBreakdown() {
  const totalAnnual = divData.reduce((s, d) => s + d.annual, 0);
  const totalMonthly = totalAnnual / 12;
  const isMonthly = divViewMode === 'monthly';
  const displayTotal = isMonthly ? totalMonthly : totalAnnual;

  const totalEl = document.getElementById('div-total');
  const labelEl = document.getElementById('div-period-label');
  const equivEl = document.getElementById('div-annual-equiv');

  if (totalEl) totalEl.textContent = '$' + displayTotal.toFixed(2);
  if (labelEl) labelEl.textContent = isMonthly ? 'Monthly Income' : 'Annual Income';
  if (equivEl) {
    if (isMonthly) {
      equivEl.textContent = '$' + totalAnnual.toFixed(2) + ' per year';
    } else {
      equivEl.textContent = '$' + totalMonthly.toFixed(2) + ' per month';
    }
  }

  const breakdown = document.getElementById('div-breakdown');
  if (!breakdown) return;

  if (totalAnnual === 0) {
    breakdown.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:10px 0">None of your current stocks pay dividends</div>';
    return;
  }

  const paying = divData.filter(d => d.yieldPct > 0);
  const nonPaying = divData.filter(d => d.yieldPct === 0);

  breakdown.innerHTML = paying.map(d => {
    const display = isMonthly ? d.monthly : d.annual;
    const barW = totalAnnual > 0 ? (d.annual / totalAnnual * 100) : 0;
    return [
      '<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">',
        '<div style="width:40px;font-weight:700;font-size:13px">' + d.ticker + '</div>',
        '<div style="flex:1">',
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">',
            '<span style="font-size:11px;color:var(--muted)">' + d.yieldPct.toFixed(2) + '% yield ' +
              '<span style="font-size:10px;padding:1px 5px;border-radius:6px;background:rgba(0,229,160,0.1);color:var(--green)">LIVE</span>' +
            '</span>',
            '<span style="font-size:13px;font-weight:700;color:var(--green)">+$' + display.toFixed(2) + '</span>',
          '</div>',
          '<div style="height:4px;background:var(--surface2);border-radius:2px;overflow:hidden">',
            '<div style="height:100%;width:' + barW + '%;background:var(--green);border-radius:2px"></div>',
          '</div>',
        '</div>',
      '</div>'
    ].join('');
  }).join('') +
  (nonPaying.length > 0 ?
    '<div style="margin-top:10px;font-size:12px;color:var(--muted);text-align:center">No dividends: ' +
    nonPaying.map(d => d.ticker).join(', ') + '</div>'
  : '');
}

async function fetchDividendYield(ticker) {
  // Try multiple proxies to get live dividend yield from Yahoo Finance
  const proxies = [
    () => {
      const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + ticker + '?interval=1d&range=1d';
      return 'https://corsproxy.io/?' + encodeURIComponent(url);
    },
    () => {
      const url = 'https://query2.finance.yahoo.com/v8/finance/chart/' + ticker + '?interval=1d&range=1d';
      return 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
    }
  ];

  for (let i = 0; i < proxies.length; i++) {
    try {
      const proxyUrl = proxies[i]();
      const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(6000) });
      let data;
      if (i === 0) {
        data = await res.json();
      } else {
        const raw = await res.json();
        data = JSON.parse(raw.contents);
      }
      const meta = data.chart.result[0].meta;
      const yld = meta.trailingAnnualDividendYield;
      if (yld && yld > 0) return parseFloat((yld * 100).toFixed(4));
      // Also check dividendYield field
      const yld2 = meta.dividendYield;
      if (yld2 && yld2 > 0) return parseFloat((yld2 * 100).toFixed(4));
      return 0;
    } catch(e) {
      continue;
    }
  }
  return 0;
}
